[binaries]
c = 'mipsel-linux-gnu-gcc'
cpp = 'mipsel-linux-gnu-g++'
ar = 'mipsel-linux-gnu-ar'
strip = 'mipsel-linux-gnu-strip'
exe_wrapper = ['meson-qemu-exe-wrapper', '--qemu=qemu-mipsel', '--gcc=mipsel-linux-gnu-gcc']

[host_machine]
system = 'linux'
cpu_family = 'mips'
cpu = 'mips'
endian = 'little'
