[binaries]
c = 'arm-linux-gnueabi-gcc'
cpp = 'arm-linux-gnueabi-g++'
ar = 'arm-linux-gnueabi-ar'
strip = 'arm-linux-gnueabi-strip'
exe_wrapper = ['meson-qemu-exe-wrapper', '--qemu=qemu-arm', '--gcc=arm-linux-gnueabi-gcc']

[host_machine]
system = 'linux'
cpu_family = 'arm'
cpu = 'arm'
endian = 'little'
