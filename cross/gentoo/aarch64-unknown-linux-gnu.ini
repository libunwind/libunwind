# Gentoo crossdev overlay for aarch64-unknown-linux-gnu.
#
# The crossdev sysroot places system libraries in lib64 rather than lib.
# Layer this on top of the base cross file:
#
#   meson setup build \
#     --cross-file cross/aarch64-unknown-linux-gnu.ini \
#     --cross-file cross/gentoo/aarch64-unknown-linux-gnu.ini

[built-in options]
c_args = ['-L/usr/aarch64-unknown-linux-gnu/lib64']
cpp_args = ['-L/usr/aarch64-unknown-linux-gnu/lib64']
