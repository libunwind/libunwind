# Gentoo crossdev overlay for riscv64-unknown-linux-gnu.
#
# The crossdev sysroot places libraries under usr/lib64 inside the sysroot
# (/usr/riscv64-unknown-linux-gnu/usr/lib64) rather than the standard lib/.
# -B tells GCC where to find crtbegin.o/crtend.o; -L adds the search path.
# Layer this on top of the base cross file:
#
#   meson setup build \
#     --cross-file cross/riscv64-unknown-linux-gnu.ini \
#     --cross-file cross/gentoo/riscv64-unknown-linux-gnu.ini

[built-in options]
c_args = ['-B/usr/riscv64-unknown-linux-gnu/usr/lib64']
cpp_args = ['-B/usr/riscv64-unknown-linux-gnu/usr/lib64']
c_link_args = ['-B/usr/riscv64-unknown-linux-gnu/usr/lib64', '-L/usr/riscv64-unknown-linux-gnu/usr/lib64']
cpp_link_args = ['-B/usr/riscv64-unknown-linux-gnu/usr/lib64', '-L/usr/riscv64-unknown-linux-gnu/usr/lib64']
