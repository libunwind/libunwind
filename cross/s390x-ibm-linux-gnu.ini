[binaries]
c = 's390x-ibm-linux-gnu-gcc'
cpp = 's390x-ibm-linux-gnu-g++'
ar = 's390x-ibm-linux-gnu-ar'
strip = 's390x-ibm-linux-gnu-strip'
exe_wrapper = ['meson-qemu-exe-wrapper', '--qemu=qemu-s390x', '--gcc=s390x-ibm-linux-gnu-gcc']

[host_machine]
system = 'linux'
cpu_family = 's390x'
cpu = 's390x'
endian = 'big'
